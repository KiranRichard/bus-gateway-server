spring.application.name=gateway-server

eureka.instance.preferIpAddress= true
eureka.client.registerWithEureka= true
eureka.client.fetchRegistry= true
eureka.client.serviceUrl.defaultZone= http://localhost:9095/eureka

gateway.host=localhost
gateway.port=9097

spring.cloud.gateway.discovery.locator.enabled= true
spring.cloud.gateway.discovery.locator.lower-case-service-id= true

spring.config.import=optional:configserver:http://localhost:9096

server.port=9097

# Route 1 - User Service
spring.cloud.gateway.routes[0].id=authorizedUser-service
#spring.cloud.gateway.routes[0].uri=http://localhost:9099
spring.cloud.gateway.routes[0].uri=lb://AUTHORIZEDUSER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

# Route 2 - Admin Service
spring.cloud.gateway.routes[1].id=admin-service
#spring.cloud.gateway.routes[1].uri=http://localhost:9090
spring.cloud.gateway.routes[1].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/admin/busRoutes/**

# Route 3 - Inventory Service
spring.cloud.gateway.routes[2].id=inventory-service
#spring.cloud.gateway.routes[2].uri=http://localhost:9091
spring.cloud.gateway.routes[2].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/inventory/buses/**

# Route 4 - Booking Service
spring.cloud.gateway.routes[3].id=booking-service
#spring.cloud.gateway.routes[3].uri=lb://http://localhost:9098
spring.cloud.gateway.routes[3].uri=lb://BOOKING-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/passengers**,/api/booking-tickets**,/api/cancel-tickets/**,/api/reserve-tickets/**

# Route 5 - Inventory Service
spring.cloud.gateway.routes[4].id=payment-service
#spring.cloud.gateway.routes[4].uri=http://localhost:9094
spring.cloud.gateway.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payments/**